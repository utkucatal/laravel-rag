<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "/var/www/html/src/public"

    <Directory "/var/www/html/src/public">
        Options Indexes FollowSymLinks
        # AllowOverride All -> Laravel's public/.htaccess (front controller rewrite) works
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    # PHP files -> php-fpm container (compose service name: app) on port 9000.
    # Both containers mount the project at /var/www/html, so paths line up.
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://app:9000"
    </FilesMatch>

    # No body-size cap here; real limits come from php.ini (post_max_size=512M).
    LimitRequestBody 0

    # Logs -> docker (docker compose logs -f webserver)
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
