[xdebug]
xdebug.mode = debug,develop
; trigger (not "yes"): xdebug connects ONLY when a debug trigger is present
; (IDE "Run/Debug", browser bookmarklet, or XDEBUG_TRIGGER env). Prevents every
; CLI/composer/artisan call from opening a session to PhpStorm and hanging.
xdebug.start_with_request = trigger
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = PHPSTORM
xdebug.discover_client_host = false
xdebug.max_nesting_level = 512

; Diagnostics: kurulum doğrulanınca log_level = 0 yap (veya bu 2 satırı sil)
xdebug.log = /tmp/xdebug.log
xdebug.log_level = 7
